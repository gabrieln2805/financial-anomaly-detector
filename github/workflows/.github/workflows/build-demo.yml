name: Build & Deploy Demo

on:
  push:
    branches: [main]
    paths:
      - "anomaly_detector.py"
      - "dashboard_builder.py"
      - "make_demo.py"
      - "demo_companies.json"
      - "templates/**"
      - "requirements.txt"
      - ".github/workflows/build-demo.yml"
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build HTML demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate 8-company demo dashboard
        run: python make_demo.py
        # No ANTHROPIC_API_KEY here → falls back to rule-based explanations.
        # Set the secret in repo Settings → Secrets → ANTHROPIC_API_KEY
        # to get full LLM-powered explanations in the deployed demo.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Prepare site directory
        run: |
          mkdir -p _site
          cp anomaly_demo.html _site/index.html
          echo "Site contents:"
          ls -lh _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
